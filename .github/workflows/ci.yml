name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
      - name: Run tests
        run: |
          python -m pytest
      - name: Build Docker image
        run: |
          docker build -t stats-app -f dockerfile .
      - name: Smoke-test container
        run: |
          docker run -d --name stats-app -p 5000:5000 stats-app
          for i in $(seq 1 10); do
            curl -fs http://localhost:5000/ && break
            sleep 1
          done
          curl -fs http://localhost:5000/ > /dev/null
          docker logs stats-app
          docker stop stats-app