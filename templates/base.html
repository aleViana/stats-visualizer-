<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}World Cup Stats{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ url_for('index') }}">World Cup Stats</a>
    <a href="{{ url_for('stats') }}">Head-to-Head</a>
    <input id="team-search" type="search" placeholder="Search a team…" autocomplete="off">
    <div id="team-search-results" class="search-results"></div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    Data: <a href="https://github.com/lightbluetitan/fifa_world_cup_1930_2022" target="_blank" rel="noopener">fifa_world_cup_1930_2022</a>
    &amp; <a href="https://github.com/martj42/international_results" target="_blank" rel="noopener">international_results</a>
  </footer>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
